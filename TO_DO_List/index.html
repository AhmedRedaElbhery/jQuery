<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO Do List</title>
    
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>

    <div id="container">
        <h2>To DO List</h2>
        <button id="newproject"> Add Project</button>
        <div id="projects">

            <ul id="main">

                <li id="mainpersonal"> <a href="#personal">personal</a><i id="deletepersonal" class="fa-solid fa-circle-xmark delete"></i> </li>

                <li id="mainwork"> <a href="#work">work</a>
                    <i id="deletework" class="fa-solid fa-circle-xmark delete"></i> 
                </li>

            </ul>

            <ol id="personal">
                <li><input type="checkbox"> personal task 1</li>
                <li><input type="checkbox"> personal task 2</li>
                <li><input type="checkbox"> personal task 3</li>
            </ol>

            <ol id="work">
                <li><input type="checkbox"> work task 1 </li>
                <li><input type="checkbox"> work task 2</li>
                <li><input type="checkbox"> work task 3</li>
            </ol>
        </div>
        <button id="newtask">Add task</button>


        <div class="form">
            <div class="modal fade" id="exampleModalLong" tabindex="-1" role="dialog" aria-labelledby="exampleModalLongTitle" aria-hidden="true">
                <div class="modal-dialog" role="document">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title" id="exampleModalLongTitle">Modal title</h5>
                      <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                      </button>
                    </div>
                    <div class="modal-body">
                      ...
                    </div>
                    <div class="modal-footer">
                      <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                      <button type="button" class="btn btn-primary">Save changes</button>
                    </div>
                  </div>
                </div>
              </div>
        </div>
    </div>
    <script>
        $(document).ready(function(){
            $('#projects').tabs();
            $('ul').sortable({axis: "x" , containment: "#projects"});
            $('ol').sortable({axis: "y" , containment: "#projects"});

            $('#deletepersonal').on('click',function(){

                $('#personal').fadeOut();
                $('#mainpersonal').fadeOut();

            });

            $('#deletework').on('click',function(){

                $('#work').fadeOut();
                $('#mainwork').fadeOut();

            });

            $('input[type="checkbox"]').change(function(){

                if($(this).is(':checked')){
                    $(this).parent().fadeOut(2000);
                }

            });

            $('#newtask').on('click',function(){

                $('.form').show();
            });

        });
    </script>
</body>
</html>
